name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      # SPA fallback: if a route isn't found as a static file, let the app's
      # client-side router handle it instead of showing GitHub's 404 page.
      - run: cp .output/public/index.html .output/public/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./.output/public

      - id: deployment
        uses: actions/deploy-pages@v4